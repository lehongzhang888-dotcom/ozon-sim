<style>
:root {
  --primary: #005BFF;
  --primary-dark: #0040CC;
  --primary-light: #E8F0FF;
  --sidebar-bg: #0F1A2E;
  --sidebar-text: #8899AA;
  --sidebar-active: #005BFF;
  --bg: #F5F7FA;
  --card: #FFFFFF;
  --border: #E8ECF1;
  --text: #1A2332;
  --text-secondary: #6B7A8D;
  --success: #00B86B;
  --warning: #FF9F43;
  --danger: #FF5B5B;
  --info: #54A0FF;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }
#app { display:flex; height:100vh; }

/* Sidebar */
#sidebar { width:240px; min-width:240px; background:var(--sidebar-bg); display:flex; flex-direction:column; overflow:hidden; transition:margin-left .3s; z-index:100; }
#sidebar .logo { height:60px; display:flex; align-items:center; padding:0 20px; border-bottom:1px solid rgba(255,255,255,.06); gap:10px; }
#sidebar .logo span { color:#fff; font-size:18px; font-weight:700; letter-spacing:.5px; }
#sidebar .logo small { color:var(--primary); font-size:11px; background:rgba(0,91,255,.15); padding:2px 8px; border-radius:10px; }
#nav-scroll { flex:1; overflow-y:auto; padding:8px 0; }
#nav-scroll::-webkit-scrollbar { width:4px; }
#nav-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
.nav-item { display:flex; align-items:center; padding:10px 20px; color:var(--sidebar-text); cursor:pointer; transition:all .15s; font-size:14px; position:relative; gap:10px; }
.nav-item:hover { color:#fff; background:rgba(255,255,255,.05); }
.nav-item.active { color:#fff; background:rgba(0,91,255,.15); }
.nav-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--primary); border-radius:0 2px 2px 0; }
.nav-item .icon { font-size:16px; width:20px; text-align:center; }
.nav-item .arrow { margin-left:auto; font-size:10px; transition:transform .2s; }
.nav-item .arrow.open { transform:rotate(90deg); }
.nav-item .badge { margin-left:auto; background:var(--danger); color:#fff; font-size:11px; padding:1px 7px; border-radius:10px; }
.sub-menu { overflow:hidden; max-height:0; transition:max-height .3s ease; background:rgba(0,0,0,.15); }
.sub-menu.open { max-height:500px; }
.sub-item { padding:8px 20px 8px 50px; color:var(--sidebar-text); font-size:13px; cursor:pointer; transition:all .1s; }
.sub-item:hover { color:#fff; background:rgba(255,255,255,.03); }
.sub-item.active { color:var(--primary); }

/* Main */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
#topbar { height:60px; min-height:60px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:16px; }
#topbar .hamburger { display:none; font-size:20px; cursor:pointer; padding:4px 8px; border-radius:4px; }
#topbar .hamburger:hover { background:var(--bg); }
#breadcrumb { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); }
#breadcrumb span { cursor:default; }
#breadcrumb .sep { color:var(--border); }
#breadcrumb .current { color:var(--text); font-weight:500; }
#topbar .spacer { flex:1; }
#topbar .top-actions { display:flex; align-items:center; gap:12px; }
#topbar .seller-name { font-size:13px; font-weight:500; color:var(--text); }
#topbar .notif-bell { position:relative; cursor:pointer; font-size:18px; padding:4px; }
#topbar .notif-bell .dot { position:absolute; top:2px; right:2px; width:8px; height:8px; background:var(--danger); border-radius:50%; border:2px solid var(--card); }
.lang-switch { display:flex; gap:0; border:1px solid var(--border); border-radius:4px; overflow:hidden; font-size:12px; }
.lang-switch div { padding:3px 8px; cursor:pointer; transition:all .1s; }
.lang-switch div.active { background:var(--primary); color:#fff; }
.lang-switch div:not(.active):hover { background:var(--bg); }

/* Content */
#content { flex:1; overflow-y:auto; padding:24px; }

/* Cards */
.card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:20px; margin-bottom:16px; }
.card-title { font-size:15px; font-weight:600; margin-bottom:16px; color:var(--text); }

/* KPI */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.kpi-card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:20px; }
.kpi-card .label { font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
.kpi-card .value { font-size:24px; font-weight:700; color:var(--text); }
.kpi-card .sub { font-size:12px; color:var(--text-secondary); margin-top:4px; }
.kpi-card .icon-bg { float:right; width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }

/* Chart containers */
.chart-row { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:24px; }
.chart-full { grid-column:1/-1; }
@media(max-width:900px){ .chart-row{grid-template-columns:1fr;} }

/* Tables */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
table th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); color:var(--text-secondary); font-weight:600; white-space:nowrap; cursor:pointer; user-select:none; }
table th:hover { color:var(--primary); }
table td { padding:10px 12px; border-bottom:1px solid var(--border); }
table tr:hover { background:var(--bg); }
table .sort-icon { font-size:10px; margin-left:4px; opacity:.4; }
table th .sort-icon.active { opacity:1; color:var(--primary); }

/* Status badges */
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:500; }
.badge-success { background:#E6F9F1; color:#00B86B; }
.badge-warning { background:#FFF3E6; color:#FF9F43; }
.badge-danger { background:#FFE8E8; color:#FF5B5B; }
.badge-info { background:#E8F0FF; color:#005BFF; }
.badge-default { background:#F0F2F5; color:#6B7A8D; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border:none; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; text-decoration:none; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-outline { border:1px solid var(--border); background:var(--card); color:var(--text); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-group { display:flex; gap:8px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }

/* Forms */
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; color:var(--text); }
.form-group .hint { font-size:11px; color:var(--text-secondary); margin-top:4px; }
.form-control { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; color:var(--text); background:var(--card); transition:border-color .15s; }
.form-control:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(0,91,255,.1); }
select.form-control { appearance:auto; }
textarea.form-control { resize:vertical; min-height:80px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
@media(max-width:600px){ .form-row,.form-row-3{grid-template-columns:1fr;} }

/* Upload zone */
.upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:40px; text-align:center; cursor:pointer; transition:all .15s; }
.upload-zone:hover { border-color:var(--primary); background:var(--primary-light); }
.upload-zone .icon { font-size:36px; margin-bottom:8px; }
.upload-zone p { font-size:13px; color:var(--text-secondary); }

/* Toast */
#toast-container { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast { padding:12px 20px; background:var(--card); border-radius:var(--radius); box-shadow:0 4px 20px rgba(0,0,0,.12); border-left:4px solid var(--primary); font-size:13px; display:flex; align-items:center; gap:8px; animation:slideIn .3s ease; min-width:240px; max-width:360px; }
.toast.success { border-left-color:var(--success); }
.toast.error { border-left-color:var(--danger); }
.toast.warning { border-left-color:var(--warning); }
@keyframes slideIn { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }

/* Modal overlay */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1000; display:flex; align-items:center; justify-content:center; animation:fadeIn .2s; }
.modal-box { background:var(--card); border-radius:12px; padding:24px; min-width:360px; max-width:560px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.15); }
.modal-box h3 { margin-bottom:16px; font-size:16px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

/* Detail panel */
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; font-size:13px; margin:12px 0; }
.detail-grid .dl { color:var(--text-secondary); }
.detail-grid .dd { font-weight:500; }
.timeline { position:relative; padding-left:20px; margin:12px 0; }
.timeline::before { content:''; position:absolute; left:6px; top:4px; bottom:4px; width:2px; background:var(--border); }
.timeline-item { position:relative; padding:0 0 14px 16px; font-size:13px; }
.timeline-item::before { content:''; position:absolute; left:-14px; top:6px; width:8px; height:8px; border-radius:50%; background:var(--primary); }
.timeline-item:last-child { padding-bottom:0; }
.timeline-item .time { font-size:11px; color:var(--text-secondary); margin-top:2px; }

/* Checkbox row */
.check-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
.check-row select,.check-row input { font-size:13px; }
.search-input { padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; width:200px; }
.search-input:focus { outline:none; border-color:var(--primary); }

/* Pagination */
.pagination { display:flex; align-items:center; gap:4px; margin-top:16px; justify-content:center; }
.pagination div { padding:6px 12px; border:1px solid var(--border); border-radius:4px; font-size:13px; cursor:pointer; transition:all .1s; }
.pagination div:hover { border-color:var(--primary); color:var(--primary); }
.pagination div.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.pagination div.disabled { opacity:.4; cursor:default; }

/* Sections */
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
.section-header h2 { font-size:18px; font-weight:600; }

/* Category cascade */
.cascade-row { display:flex; gap:12px; }
.cascade-row select { flex:1; }

/* Marketing cards */
.promo-card { border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.promo-card .promo-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.promo-card .promo-meta { display:flex; gap:16px; font-size:12px; color:var(--text-secondary); }

/* Logistics cards */
.logi-card { border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.logi-card .info { font-size:13px; }
.logi-card .info .title { font-weight:500; }
.logi-card .info .desc { color:var(--text-secondary); font-size:12px; margin-top:2px; }

/* Rating */
.stars { color:#FF9F43; font-size:14px; }

/* Mobile overlay */
#sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:99; }
@media(max-width:768px){
  #sidebar { position:fixed; left:0; top:0; bottom:0; z-index:100; margin-left:-240px; }
  #sidebar.open { margin-left:0; }
  #sidebar-overlay.open { display:block; }
  #topbar .hamburger { display:block; }
  #content { padding:16px; }
}

/* Misc */
.text-right { text-align:right; }
.text-center { text-align:center; }
.mt-8 { margin-top:8px; }
.mt-16 { margin-top:16px; }
.mb-8 { margin-bottom:8px; }
.mb-16 { margin-bottom:16px; }
.flex { display:flex; }
.flex-center { display:flex; align-items:center; }
.gap-8 { gap:8px; }
.gap-16 { gap:16px; }
.truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.thumb { width:40px; height:40px; border-radius:6px; object-fit:cover; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:18px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-secondary); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* Collapsible filter */
.filter-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
.filter-bar select,.filter-bar input { padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; }

/* Review card */
.review-card { padding:16px 0; border-bottom:1px solid var(--border); }
.review-card:last-child { border-bottom:none; }
.review-card .review-header { display:flex; justify-content:space-between; margin-bottom:6px; }
.review-card .reviewer { font-weight:500; font-size:13px; }
.review-card .review-date { font-size:12px; color:var(--text-secondary); }
.review-card .review-text { font-size:13px; color:var(--text-secondary); line-height:1.5; }
.review-card .review-product { font-size:12px; color:var(--primary); margin-top:4px; }
</style>
</head>

// ============ UTILITIES ============
function t(texts) { return texts && texts[state.lang] ? texts[state.lang] : texts; }
function fmt(n) { return n.toLocaleString('ru-RU'); }
function fmtRub(n) { return '₽' + fmt(n); }
function fmtCny(n) { return '≈¥' + fmt(Math.round(n*0.08)) }
function fmtRubCny(n) { return fmtRub(n) + ' <span style="color:var(--text-secondary);font-size:11px">('+fmtCny(n)+')</span>'; }
function statusBadge(s) {
  const m={'在售':'success','审核中':'warning','已下架':'danger','待确认':'warning','备货中':'info','已发货':'info','已签收':'success','已完成':'success','退货/退款':'danger','未开始':'default','进行中':'success','已结束':'default','已过期':'default'};
  return `<span class="badge badge-${m[s]||'default'}">${s}</span>`;
}
function orderStatusBadge(s) { return statusBadge(s); }

function showToast(msg, type='') {
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.innerHTML=msg;
  c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(100%)'; el.style.transition='all .3s'; setTimeout(()=>el.remove(),300); },3000);
}

function toggleSidebar() {
  state.sidebarOpen=!state.sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open',state.sidebarOpen);
  document.getElementById('sidebar-overlay').classList.toggle('open',state.sidebarOpen);
}

function setLanguage(l) {
  state.lang=l;
  document.querySelectorAll('#langSwitch div').forEach(d=>d.classList.toggle('active',d.dataset.lang===l));
  renderNav();
  renderBreadcrumb();
  navigate(state.module,state.sub);
}

// ============ NAVIGATION ============
function renderNav() {
  const el=document.getElementById('nav-scroll');
  let html='';
  NAV.forEach(item=>{
    const isActive=state.module===item.id;
    const expanded=state.expanded[item.id];
    const label=t(item.label);
    html+=`<div class="nav-item${isActive?' active':''}" onclick="toggleNav('${item.id}')">
      <span class="icon">${item.icon}</span><span>${label}</span>
      ${item.subs?`<span class="arrow${expanded?' open':''}">▶</span>`:''}
    </div>`;
    if(item.subs){
      html+=`<div class="sub-menu${expanded?' open':''}">`;
      item.subs.forEach(sub=>{
        const subActive=state.sub===sub.id;
        html+=`<div class="sub-item${subActive?' active':''}" onclick="navigate('${item.id}','${sub.id}')">${t(sub.label)}</div>`;
      });
      html+=`</div>`;
    }
  });
  el.innerHTML=html;
}

function toggleNav(id) {
  const item=NAV.find(n=>n.id===id);
  if(item&&item.subs){
    if(state.expanded[id]){ delete state.expanded[id]; }
    else { state.expanded[id]=true; }
    renderNav();
  } else {
    navigate(id,null);
  }
}

function navigate(module,sub) {
  state.module=module;
  state.sub=sub;
  // Auto-expand parent nav
  NAV.forEach(n=>{ if(n.id===module&&n.subs) state.expanded[module]=true; });
  renderNav();
  renderBreadcrumb();
  renderContent();
}

function renderBreadcrumb() {
  const el=document.getElementById('breadcrumb');
  const item=NAV.find(n=>n.id===state.module);
  if(!item){ el.innerHTML=''; return; }
  let html=`<span>🏠</span><span class="sep">/</span><span>${t(item.label)}</span>`;
  if(state.sub&&item.subs){
    const sub=item.subs.find(s=>s.id===state.sub);
    if(sub) html+=`<span class="sep">/</span><span class="current">${t(sub.label)}</span>`;
  }
  el.innerHTML=html;
}

let productFilter={text:'',cat:'',status:''};
function filterProducts(v){ productFilter.text=v; applyProductFilter(); }
function filterProductsByCat(v){ productFilter.cat=v; applyProductFilter(); }
function filterProductsByStatus(v){ productFilter.status=v; applyProductFilter(); }
function applyProductFilter(){
  let p=MOCK.products;
  if(productFilter.text) p=p.filter(x=>x.name.includes(productFilter.text)||x.sku.includes(productFilter.text));
  if(productFilter.cat) p=p.filter(x=>x.category.startsWith(productFilter.cat));
  if(productFilter.status) p=p.filter(x=>x.status===productFilter.status);
  renderProductRows(p);
}
function sortProducts(col){
  const p=[...MOCK.products];
  if(state.productSort.col===col) state.productSort.asc=!state.productSort.asc;
  else { state.productSort.col=col; state.productSort.asc=true; }
  p.sort((a,b)=>{
    const va=col==='price'?a.price:col==='stock'?a.stock:a[col];
    const vb=col==='price'?b.price:col==='stock'?b.stock:b[col];
    return state.productSort.asc?(va>vb?1:-1):(va<vb?1:-1);
  });
  applyProductFilter();
  renderProductRows(p);
}
function renderProductRows(data){
  const el=document.getElementById('productTbody');
  if(!el) return;
  el.innerHTML=data.map(p=>`
    <tr>
      <td><input type="checkbox"></td>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="thumb">${p.image}</div>
        <div><div style="font-weight:500">${p.name}</div><div style="color:var(--text-secondary);font-size:11px">${p.nameRu}</div></div>
      </div></td>
      <td>${p.sku}</td>
      <td>${p.category}</td>
      <td>${fmtRub(p.price)}<br><span style="color:var(--text-secondary);font-size:11px"><s>${fmtRub(p.oldPrice)}</s></span></td>
      <td><span style="${p.stock<10?'color:var(--danger);font-weight:600':''}">${p.stock}</span></td>
      <td>${statusBadge(p.status)}</td>
      <td>
        <div class="btn-group">
          <button class="btn btn-outline btn-sm" onclick="showToast('${state.lang==='zh'?'✏️ 编辑商品: '+p.name:'✏️ Редактировать: '+p.name}','')">${state.lang==='zh'?'编辑':'Ред.'}</button>
          ${p.status==='在售'?`<button class="btn btn-danger btn-sm" onclick="showToast('${state.lang==='zh'?'⛔ 已下架: '+p.name:'⛔ Снято: '+p.name}','warning')">${state.lang==='zh'?'下架':'Снять'}</button>`:''}
        </div>
      </td>
    </tr>
  `).join('');
}

function updateCats(level){
  const v1=document.getElementById('cat1').value;

    const el2=document.getElementById('cat2');
    el2.innerHTML='<option value="">'+ (state.lang==='zh'?'选择二级类目':'Выберите') +'</option>';
    if(c1) c1.subs.forEach(s=>{ el2.innerHTML+=`<option value="${s.name}">${s.name}</option>`; });
    document.getElementById('cat3').innerHTML='<option value="">'+ (state.lang==='zh'?'选择三级类目':'Выберите') +'</option>';
  } else if(level===3){
    const v2=document.getElementById('cat2').value;
    const c2=c1&&c1.subs.find(s=>s.name===v2);
    const el3=document.getElementById('cat3');
    el3.innerHTML='<option value="">'+ (state.lang==='zh'?'选择三级类目':'Выберите') +'</option>';
    if(c2) c2.subs.forEach(s=>{ el3.innerHTML+=`<option value="${s}">${s}</option>`; });
  }
}
